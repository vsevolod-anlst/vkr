version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: always
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db
      - migrations
    networks:
      - rag-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-worker
    restart: always
    command: celery -A app.celery_app.celery_app worker --loglevel=INFO -Q rag --concurrency=1
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "bash /app/healthcheck_gpu.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db
      - migrations
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface
      - TRANSFORMERS_CACHE=/root/.cache/huggingface
      - HF_TOKEN=${HF_TOKEN}

  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-migrations
    command: alembic upgrade head
    volumes:
      - ./backend/alembic:/app/alembic
      - ./backend/app:/app/app
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - rag-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rag-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rag-net

  db:
    image: postgres:15
    container_name: rag-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 30s
      retries: 6
    networks:
      - rag-net

  nginx:
    image: nginx:latest
    container_name: rag-nginx
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - rag-net

  telegram-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: rag-telegram-bot
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f bot.py >/dev/null && curl -m 3 -f https://api.telegram.org/bot$TELEGRAM_TOKEN/getMe || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    env_file:
      - .env
    depends_on:
      - nginx
    networks:
      - rag-net
  
  sender:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-sender
    restart: always
    command: celery -A app.celery_app.celery_app worker --loglevel=INFO -Q send_message --concurrency=1
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery worker' >/dev/null && curl -m 3 -f https://api.telegram.org/bot$TELEGRAM_TOKEN/getMe || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    env_file:
      - .env
    depends_on:
      - rabbitmq
    networks:
      - rag-net

  flower:
    image: mher/flower
    container_name: rag-flower
    restart: always
    entrypoint: ["celery"]
    command: ["--broker=amqp://guest:guest@rag-rabbitmq:5672//", "flower"]
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
    networks:
      - rag-net



volumes:
  pgdata:
  hf_cache:
    external: true

networks:
  rag-net:
    driver: bridge
