version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    restart: always
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db
      - migrations
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-worker
    restart: always
    command: celery -A app.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - db
      - migrations
    networks:
      - rag-net
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-migrations
    command: alembic upgrade head
    depends_on:
      - db
    env_file:
      - .env
    networks:
      - rag-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rag-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - rag-net

  db:
    image: postgres:15
    container_name: rag-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 30s
      retries: 6
    networks:
      - rag-net

  nginx:
    image: nginx:latest
    container_name: rag-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - rag-net

volumes:
  pgdata:

networks:
  rag-net:
    driver: bridge
